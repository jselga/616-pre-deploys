version: "3.9"

services:
  db:
    image: mariadb:11
    container_name: metari-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      # MYSQL_USER: 
      # MYSQL_PASSWORD:
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 10  
    volumes:
      - db_data:/var/lib/mysql
    # ports:
      # - "${MYSQL_PORT:-3306}:3306"

  backend:
    build: ./backend
    container_name: metari-backend
    restart: always
    #ports:
      #- "${BACKEND_PORT:-3001}:3001"    
    depends_on:
      - db
    env_file:
      - .env
    command: >
      sh -c " echo 'Waiting for DB...'; until node -e \"require('mysql2/promise').createConnection({host:'db',user:'root',password: process.env.MYSQL_ROOT_PASSWORD}).then(c=>c.end())\"; do
        sleep 2;
      done; npx prisma generate && npm run migrate:apply && npm run seed && npm start "

  frontend:
    build: ./metari-app
    container_name: metari-frontend
    restart: always
    # ports:
    #   - "${FRONTEND_PORT:-8087}:80"
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin:5.2.3-apache
    container_name: metari-phpmyadmin
    restart: always
    depends_on:
      - db
    environment:
      PMA_HOST: db
    ports:
      - "${PHPMYADMIN_PORT:-8089}:80"

  nginx:
    image: nginx:latest
    container_name: metari-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
